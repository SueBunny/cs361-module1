<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration — Subilo Ngoma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Student Registration</h1>
        <nav>
            <a href="profile.html">Profile</a>
            <a href="register.html">Register</a>
            <a href="table.html">Results</a>
        </nav>
    </header>

    <main>
        <form action="#" method="POST">

            <fieldset>
                <legend>Personal Details</legend>

                <p>
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </p>

                <p>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </p>

                <p>
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone">
                </p>

                <p>
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob">
                </p>

                <fieldset>
                    <legend>Gender</legend>
                    <p>
                        <input type="radio" id="gender-male" name="gender" value="Male">
                        <label for="gender-male">Male</label>

                        <input type="radio" id="gender-female" name="gender" value="Female">
                        <label for="gender-female">Female</label>

                        <input type="radio" id="gender-other" name="gender" value="Other">
                        <label for="gender-other">Other</label>
                    </p>
                </fieldset>

                <p>
                    <label for="photo">Profile Photo:</label>
                    <input type="file" id="photo" name="photo" accept="image/*">
                </p>
            </fieldset>

            <fieldset>
                <legend>Academic Details</legend>

                <p>
                    <label for="studentid">Student ID:</label>
                    <input type="text" id="studentid" name="studentid"
                           pattern="[A-Z]{2}[0-9]{6}"
                           title="Two uppercase letters followed by six digits, e.g. CS123456"
                           required>
                </p>

                <p>
                    <label for="programme">Programme:</label>
                    <select id="programme" name="programme">
                        <option value="CS">Computer Science</option>
                        <option value="IT">Information Technology</option>
                        <option value="IS">Information Systems</option>
                    </select>
                </p>

                <p>
                    <label for="year">Year of Study:</label>
                    <input type="number" id="year" name="year" min="1" max="5">
                </p>

                <fieldset>
                    <legend>Specialisation</legend>
                    <p>
                        <input type="checkbox" id="spec-web" name="specialisation" value="Web">
                        <label for="spec-web">Web</label>

                        <input type="checkbox" id="spec-security" name="specialisation" value="Security">
                        <label for="spec-security">Security</label>

                        <input type="checkbox" id="spec-ai" name="specialisation" value="AI">
                        <label for="spec-ai">AI</label>

                        <input type="checkbox" id="spec-networks" name="specialisation" value="Networks">
                        <label for="spec-networks">Networks</label>
                    </p>
                </fieldset>
            </fieldset>

            <fieldset>
                <legend>About You</legend>

                <p>
                    <label for="about">Tell us about yourself:</label><br>
                    <textarea id="about" name="about" rows="4" required></textarea>
                </p>

                <p>
                    <input type="submit" value="Register">
                    <input type="reset" value="Clear Form">
                </p>
            </fieldset>

        </form>
    </main>

    <footer>
        <a href="mailto:subilongoma706@email.com">subilongoma706@email.com</a>
        <p>&copy; 2026 Subilo Ngoma</p>
    </footer>
</body>
</html>
